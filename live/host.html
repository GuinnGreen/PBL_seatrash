<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即時挑戰 主控台 · 海洋偵查員</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/live.css">
</head>
<body>
  <div class="live-wrap" style="max-width:960px">
    <!-- 設定:難度 → 題數 → 模式 -->
    <section id="setup">
      <h1 class="live-title">即時挑戰 · 主控台</h1>

      <div id="setup-difficulty" class="setup-step">
        <p class="setup-q">① 選擇難度</p>
        <div class="setup-choices">
          <button class="live-btn live-btn--primary" data-difficulty="basic">簡單<small>看圖選 5 大類</small></button>
          <button class="live-btn live-btn--accent" data-difficulty="icc">進階<small>ICC 細項四選一</small></button>
        </div>
      </div>

      <div id="setup-count" class="setup-step live-hidden">
        <p class="setup-q">② 選擇題數</p>
        <div class="setup-choices">
          <button class="live-btn" data-count="5">5 題</button>
          <button class="live-btn" data-count="10">10 題</button>
          <button class="live-btn" data-count="15">15 題</button>
          <button class="live-btn" data-count="20">20 題</button>
        </div>
      </div>

      <div id="setup-mode" class="setup-step live-hidden">
        <p class="setup-q">③ 計分模式</p>
        <div class="setup-choices">
          <button class="live-btn live-btn--primary" data-mode="individual">個人對戰</button>
          <button class="live-btn live-btn--accent" data-mode="group">小組對戰</button>
        </div>
      </div>
    </section>

    <!-- 等待室 -->
    <section id="lobby" class="live-hidden">
      <h2>加入碼</h2>
      <div id="pin-display" class="live-big"></div>
      <p>學生開 <strong id="join-url"></strong> 輸入加入碼</p>
      <h3>已加入(<span id="player-count">0</span>)</h3>
      <div id="player-list" class="live-grid-screen"></div>
      <button id="start" class="live-cat-btn" style="background:#16a34a;max-width:240px;margin-top:16px">開始挑戰</button>
    </section>

    <!-- 出題中 -->
    <section id="stage" class="live-hidden">
      <div id="q-progress"></div>
      <img id="s-img" class="live-q-img" alt="題目">
      <h2 id="answered-count">已作答 0</h2>
      <div id="dist" class="live-hidden"></div>
      <div style="margin-top:16px">
        <button id="lock" class="live-cat-btn" style="background:#f59e0b;max-width:200px">結束作答</button>
        <button id="reveal" class="live-cat-btn live-hidden" style="background:#2563eb;max-width:200px">公布正解</button>
        <button id="next" class="live-cat-btn live-hidden" style="background:#16a34a;max-width:200px">下一題</button>
      </div>
    </section>

    <!-- 排行榜 -->
    <section id="board" class="live-hidden">
      <h2 id="board-title">排行榜</h2>
      <div id="board-list" class="live-grid-screen"></div>
      <div id="board-actions" class="live-hidden" style="margin-top:20px">
        <button id="replay" class="live-btn live-btn--primary">再玩一次</button>
        <button id="home" class="live-btn">回主選單</button>
      </div>
    </section>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/live/host.js"></script>
</body>
</html>
