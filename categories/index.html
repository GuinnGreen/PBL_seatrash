<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>認識 5 大類 · 海洋偵查員</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
  <main>
    <div class="page-head">
      <h1>認識 5 大類海廢</h1>
      <p>我們把海邊會撿到的東西分成 <strong>5 大類</strong>，這樣記錄、整理才方便。</p>
    </div>

    <div class="cat-grid">
      <a class="cat-card" href="/categories/beverage.html">
        <span class="dot dot-beverage"></span>
        <h3>🔵 飲料容器</h3>
        <p>瓶、罐、杯、蓋</p>
      </a>
      <a class="cat-card" href="/categories/food.html">
        <span class="dot dot-food"></span>
        <h3>🟢 食物包裝</h3>
        <p>袋、吸管、餐具</p>
      </a>
      <a class="cat-card" href="/categories/fishing.html">
        <span class="dot dot-fishing"></span>
        <h3>🟡 漁業用具</h3>
        <p>網、繩、浮球（蚵棚）</p>
      </a>
      <a class="cat-card" href="/categories/hazard.html">
        <span class="dot dot-hazard"></span>
        <h3>🔴 個人衛生與危險</h3>
        <p>菸蒂、口罩、針筒</p>
      </a>
      <a class="cat-card" href="/categories/other.html">
        <span class="dot dot-other"></span>
        <h3>⚪ 其他/不確定</h3>
        <p>碎片、微塑膠、不明物</p>
      </a>
    </div>

    <div class="callout callout--note" style="margin-top:32px;">
      <h4>怎麼上這節？</h4>
      <p>老師會帶你逐類看 5 大類的代表照片。每類花 2–3 分鐘，看完之後玩<a href="/game/">分類遊戲</a>。</p>
    </div>

    <div class="page-nav">
      <a class="btn btn-ghost" href="/">← 回首頁</a>
      <a class="btn btn-primary" href="/categories/beverage.html">從第 1 類開始 →</a>
    </div>
  </main>
  <script src="/js/nav.js"></script>
  <script>OG.renderNav('categories'); OG.renderFooter();</script>

</html>
